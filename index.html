<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Vũ Tiểu Muội 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #ffd6e0, #ff9a9e);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* blur */
body.opened::after {
    content: "";
    position: fixed;
    inset: 0;
    backdrop-filter: blur(6px) brightness(0.9);
    z-index: 1;
}

/* PHONG BÌ */
.envelope {
    width: 520px;
    height: 340px;
    background: #ff6b81;
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    z-index: 5;
    overflow: hidden;
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff8fa3;
    clip-path: polygon(0 0, 100% 0, 50% 65%);
    transform-origin: top;
    transition: 0.8s;
}

.envelope.open .flap {
    transform: rotateX(180deg);
}

/* THIỆP */
.letter {
    position: fixed;
    width: 440px;
    height: 270px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    color: #ff6b81;

    top: 120%;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;

    transition: all 1s cubic-bezier(0.2, 1.5, 0.5, 1);
    z-index: 10;
}

.letter.show {
    top: 50%;
    transform: translate(-50%, -50%);
    opacity: 1;
    box-shadow: 0 0 80px rgba(255,255,255,1);
}

/* IG */
.ig-link {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: 0.5s;
}

/* ẢNH */
.photo {
    position: fixed;
    width: 140px;
    height: 140px;
    object-fit: cover;
    border-radius: 15px;
    opacity: 0;
    z-index: 9;

    transition: all 1s cubic-bezier(0.2, 1.5, 0.5, 1);

    /* glow mạnh */
    box-shadow:
        0 0 15px #fff,
        0 0 30px #ff6b81,
        0 0 60px #ff6b81,
        0 0 90px #ff9a9e;

    animation: glowPulse 2s infinite alternate;
}

/* glow pulse */
@keyframes glowPulse {
    from {
        filter: brightness(1);
    }
    to {
        filter: brightness(1.3);
    }
}

/* viền lấp lánh mạnh */
.photo::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 15px;
    padding: 2px;

    background: linear-gradient(
        45deg,
        #fff,
        #ff6b81,
        #ffd6e0,
        #ff9a9e,
        #fff
    );

    background-size: 400% 400%;

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;

    animation: sparkle 2s linear infinite;
}

@keyframes sparkle {
    0% { background-position: 0% }
    100% { background-position: 200% }
}

/* vị trí */
.p1 { top: 110%; left: -50px; }
.p2 { top: 110%; right: -50px; }
.p3 { top: 120%; left: 50%; transform: translateX(-50%); }

/* bay */
.p1.show { top: 20%; left: 20%; opacity: 1; transform: rotate(-10deg); }
.p2.show { top: 20%; right: 20%; opacity: 1; transform: rotate(10deg); }

/* ảnh thứ 3 bay lên giữa */
.p3.show {
    top: 15%;
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
}

/* particle */
.particle {
    position: fixed;
    font-size: 20px;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    to { transform: translateY(-120vh); opacity: 0; }
}

/* hoa */
.flower {
    position: fixed;
    font-size: 22px;
    animation: flowerFloat 3s ease-out forwards;
}

@keyframes flowerFloat {
    0% { opacity: 0; }
    100% {
        transform: translate(var(--x), -120vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope()" id="env">
    <div class="flap"></div>
</div>

<div class="letter" id="letter">
    <h2>💖 klinhdepgainhathmt 💖</h2>
    <p>
        🌸 Cậu luôn xinh tươi như hoa nha ✨ <br>
        💫 Mong ngày nào cũng thật vui 💕
    </p>

    <div class="ig-link" id="igLink">
        <p>👉 Follow IG tớ cho tròn 100 nhé 😄</p>
        <a href="https://www.instagram.com/_nmh14_/" target="_blank">📷 @_nmh14_</a>
    </div>
</div>

<img src="img1.png" class="photo p1">
<img src="img2.jpg" class="photo p2">
<img src="img3.jpg" class="photo p3">

<script>
function openEnvelope() {
    if (env.classList.contains("open")) return;

    env.classList.add("open");
    document.body.classList.add("opened");

    setTimeout(() => letter.classList.add("show"), 300);
    setTimeout(() => {
        document.querySelector(".p1").classList.add("show");
        document.querySelector(".p2").classList.add("show");
    }, 600);

    // ảnh 3 bay sau cùng
    setTimeout(() => {
        document.querySelector(".p3").classList.add("show");
    }, 1200);

    setTimeout(() => igLink.style.opacity = 1, 1800);

    // particle
    for (let i = 0; i < 50; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.innerHTML = ["💖","✨","🌸"][Math.random()*3|0];
        p.style.left = Math.random()*100+"vw";
        p.style.animationDuration = (2+Math.random()*2)+"s";
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),4000);
    }

    // hoa
    for (let i = 0; i < 40; i++) {
        const f = document.createElement("div");
        f.className = "flower";
        f.innerHTML = ["🌸","🌺","🌼"][Math.random()*3|0];
        f.style.left = "50%";
        f.style.setProperty("--x",(Math.random()-0.5)*500+"px");
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),4000);
    }
}
</script>

</body>
</html>
